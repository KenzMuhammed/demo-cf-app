name: "IaC: Cloudflare Destroy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to run IaC
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      confirmation:
        description: Type destroy to confirm (irreversible)
        required: true
        type: string

permissions:
  contents: read

jobs:
  terraform-destroy:
    name: Destroy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        # update working directory to the IAC
        working-directory: infra/iac/cloudflare

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_STATE_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      TF_STATE_RESOURCE_GROUP: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
      TF_STATE_SAS_TOKEN: ${{ secrets.TF_STATE_SAS_TOKEN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CF_API_TOKEN }}

    steps:
      # Job default `working-directory` is under `infra/...`, which does not exist until the IaC checkout runs.
      - name: Confirm destroy
        working-directory: .
        run: |
          if [[ "${{ github.event.inputs.confirmation }}" != "destroy" ]]; then
            echo "Mismatch: confirmation must be the exact word destroy."
            exit 1
          fi

      - name: Checkout pipeline repo
        uses: actions/checkout@v6

      - name: Generate token for IaC repo (read)
        uses: actions/create-github-app-token@v3
        id: iac-token
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: valoriz
          repositories: streakjs-common-infra

      - name: Checkout IaC repo
        uses: actions/checkout@v6
        with:
          repository: valoriz/streakjs-common-infra
          ref: main
          token: ${{ steps.iac-token.outputs.token }}
          path: infra

      # Reads .github/iac-config.json fresh on every run (shared with iac-cf-onboard.yml /
      # iac-cf-create.yml) instead of relying on GitHub variables set at onboard time — destroy must
      # target exactly what's currently in the config file, not a possibly-stale earlier snapshot.
      # Sets PROJECT_NAME, CF_ACCOUNT_ID, CF_WORKERS, CF_PAGES_PROJECTS, CF_R2_BUCKET_LOCATION, etc.,
      # and the TF_VAR_cloudflare_account_id / TF_VAR_workers / TF_VAR_pages_projects aliases directly.
      - name: Read IAC config
        working-directory: .
        env:
          ENV_NAME: ${{ github.event.inputs.environment }}
          CONFIG_FILE: .github/iac-config.json
        run: |
          chmod +x infra/iac/cloudflare/scripts/read-iac-config.sh
          infra/iac/cloudflare/scripts/read-iac-config.sh

      # WORKER_SECRETS is one GitHub secret holding a JSON object of arbitrary name -> value pairs
      # (e.g. {"GOOGLE_SCRIPT_URL":"...","MY_CUSTOM_KEY":"..."}) — developers add or rotate a
      # worker secret by setting this one secret themselves (`gh secret set WORKER_SECRETS --env
      # <env> --body '{...}'` or via the GitHub UI), no change to this repo ever required. A
      # worker opts into a key by listing its name in its application's secret_vars in
      # iac-config.json; any name is accepted there, nothing is validated against an allowlist.
      # A name missing from WORKER_SECRETS doesn't block this workflow — Terraform falls back to
      # a placeholder value for it (see iac/cloudflare/main.tf); fill in the real value and
      # re-run Create to push the correct one.
      - name: Read worker secrets
        working-directory: .
        env:
          WORKER_SECRETS: ${{ secrets.WORKER_SECRETS }}
        run: |
          [[ -z "$WORKER_SECRETS" ]] && WORKER_SECRETS="{}"
          echo "$WORKER_SECRETS" | jq empty || { echo "❌ WORKER_SECRETS secret is not valid JSON"; exit 1; }
          echo "TF_VAR_worker_secrets=$(echo "$WORKER_SECRETS" | jq -c .)" >> "$GITHUB_ENV"

      # cloudflare_settings is assembled here from the values read-iac-config.sh resolved from
      # iac-config.json (not GitHub variables) into the single object var.cloudflare_settings expects.
      - name: Build cloudflare settings object
        working-directory: .
        run: |
          echo "TF_VAR_cloudflare_settings=$(jq -n -c \
            --arg r2_bucket_location "$CF_R2_BUCKET_LOCATION" \
            --arg worker_compatibility_date "$CF_WORKER_COMPATIBILITY_DATE" \
            --argjson manage_zone_resources "$([ "$CF_MANAGE_ZONE_RESOURCES" = "true" ] && echo true || echo false)" \
            --arg security_contact "$CF_SECURITY_CONTACT" \
            --arg dmarc_policy "$CF_DMARC_POLICY" \
            --arg dmarc_rua "$CF_DMARC_RUA" \
            '{r2_bucket_location: $r2_bucket_location, worker_compatibility_date: $worker_compatibility_date, manage_zone_resources: $manage_zone_resources, security_contact: $security_contact, dmarc_policy: $dmarc_policy, dmarc_rua: $dmarc_rua}')" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Validate required configuration
        run: |
          required_vars=(
            PROJECT_NAME
            TF_STATE_STORAGE_ACCOUNT
            TF_STATE_RESOURCE_GROUP
            TF_STATE_CONTAINER
            TF_STATE_SAS_TOKEN
            TF_VAR_cloudflare_api_token
            TF_VAR_cloudflare_account_id
          )

          missing=()
          for v in "${required_vars[@]}"; do
            [[ -n "${!v:-}" ]] || missing+=("${v}")
          done

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required environment secrets or variables:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Terraform Init (dynamic backend)
        run: |
          STATE_KEY="streakjs-clients/${PROJECT_NAME}/${{ github.event.inputs.environment }}.terraform.tfstate"
          SAS_TOKEN="${TF_STATE_SAS_TOKEN#\?}"

          terraform init -reconfigure \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="sas_token=${SAS_TOKEN}" \
            -backend-config="key=${STATE_KEY}"

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -out=tfdestroy

      - name: Terraform Apply (destroy)
        run: terraform apply -auto-approve tfdestroy
