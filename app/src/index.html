<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenzopsify Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <div class="brand">🚀 kenzopsify.site</div>
        <h1>Deploy Successfully!</h1>
        <p class="subtitle">This static site is served securely via Cloudflare Workers and R2 storage.</p>
        
        <div class="status-container">
            <span class="pulse-indicator"></span>
            <span id="status-text">Validating security headers...</span>
        </div>

        <div class="metrics">
            <div class="metric-card">
                <div class="metric-title">Hosting</div>
                <div class="metric-value">Cloudflare Workers</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Storage</div>
                <div class="metric-value">Cloudflare R2</div>
            </div>
        </div>

        <button id="test-btn">Verify Script Nonce</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
